<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Владислав Козмеску — Видеомонтажёр</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Syne', sans-serif;
            background: linear-gradient(135deg, #e8f0ff 0%, #f3e8ff 100%);
            color: #2d3748;
            overflow-x: hidden;
            min-height: 100vh;
        }

        #particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: radial-gradient(circle, rgba(147, 197, 253, 0.8), transparent);
            border-radius: 50%;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            position: relative;
            z-index: 2;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInDown 1s ease;
        }

        h1 {
            font-weight: 800;
            font-size: 4.5rem;
            background: linear-gradient(135deg, #667eea 0%, #a78bfa 50%, #667eea 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            letter-spacing: -2px;
        }

        .subtitle {
            font-size: 1.3rem;
            color: #6b7280;
        }

        /* ── TAB NAV ── */
        .tab-nav {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 40px;
            animation: fadeInDown 1s ease 0.2s both;
        }

        .tab-btn {
            font-family: 'Syne', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            padding: 12px 32px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(255,255,255,0.35);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.5);
            color: #6b7280;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #667eea, #a78bfa);
            color: #fff;
            box-shadow: 0 8px 24px rgba(102,126,234,0.4);
            border-color: transparent;
        }

        .tab-btn:hover:not(.active) {
            background: rgba(255,255,255,0.5);
            color: #4b5563;
            transform: translateY(-2px);
        }

        /* ── PAGES ── */
        .page { display: none; }
        .page.active { display: block; }

        .glass-card {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 30px;
            padding: 40px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(102, 126, 234, 0.15);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            animation: fadeInUp 0.8s ease both;
        }

        .glass-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 45px rgba(102, 126, 234, 0.25);
            background: rgba(255, 255, 255, 0.35);
        }

        .intro-section {
            display: flex;
            align-items: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .profile-photo {
            width: 150px;
            height: 150px;
            border-radius: 30px;
            object-fit: cover;
            border: 3px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px rgba(102, 126, 234, 0.2);
        }

        .intro-text { flex: 1; min-width: 300px; }

        h2 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #667eea 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
        }

        h3 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 15px;
            color: #4b5563;
        }

        p {
            line-height: 1.8;
            color: #6b7280;
            margin-bottom: 20px;
        }

        /* ── FILTER BUTTONS ── */
        .filter-bar {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .filter-btn {
            font-family: 'Syne', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            padding: 9px 24px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
            background: rgba(255,255,255,0.35);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.5);
            color: #6b7280;
        }

        .filter-btn.active {
            background: linear-gradient(135deg, #667eea, #a78bfa);
            color: #fff;
            box-shadow: 0 6px 18px rgba(102,126,234,0.35);
            border-color: transparent;
        }

        .filter-btn:hover:not(.active) {
            background: rgba(255,255,255,0.55);
            color: #4b5563;
            transform: translateY(-2px);
        }

        /* ── PORTFOLIO VIDEOS ── */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 350px));
            gap: 25px;
            max-width: 1100px;
            margin-left: auto;
            margin-right: auto;
            justify-content: center;
        }

        .video-card {
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 25px;
            overflow: hidden;
            transition: all 0.35s cubic-bezier(0.4,0,0.2,1);
            max-width: 400px;
            width: 100%;
        }

        .video-card.hidden {
            display: none;
        }

        .video-card:hover {
            transform: scale(1.02);
            background: rgba(255, 255, 255, 0.4);
        }

        .video-card video {
            width: 100%;
            max-height: 600px;
            object-fit: contain;
            background: #000;
            display: block;
            border-radius: 25px;
        }

        /* ── CONTACTS ── */
        .contact-info {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 30px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 20px;
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
        }

        .contact-item:hover {
            background: rgba(255, 255, 255, 0.45);
            transform: translateX(10px);
        }

        .contact-icon {
            width: 40px;
            height: 40px;
            fill: none;
            stroke: url(#gradient);
            stroke-width: 2;
            flex-shrink: 0;
        }

        .telegram-icon { width: 40px; height: 40px; flex-shrink: 0; }

        /* ══════════════════════════════
           CASES PAGE
        ══════════════════════════════ */
        .cases-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 28px;
            margin-top: 10px;
        }

        .case-card {
            background: rgba(255,255,255,0.28);
            backdrop-filter: blur(18px);
            border: 1px solid rgba(255,255,255,0.5);
            border-radius: 28px;
            overflow: hidden;
            transition: all 0.35s cubic-bezier(0.4,0,0.2,1);
            animation: fadeInUp 0.7s ease both;
        }

        .case-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 50px rgba(102,126,234,0.22);
            background: rgba(255,255,255,0.38);
        }

        /* video area */
        .case-video-wrap {
            position: relative;
            width: 100%;
            aspect-ratio: 9/16;
            background: #000;
            overflow: hidden;
        }

        .case-video-wrap video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* views badge */
        .views-badge {
            position: absolute;
            bottom: 12px;
            right: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50px;
            padding: 6px 14px;
            color: #fff;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .views-badge svg {
            width: 16px;
            height: 16px;
            fill: #a78bfa;
            flex-shrink: 0;
        }

        /* case body */
        .case-body {
            padding: 22px 24px 26px;
        }

        .case-niche {
            display: inline-block;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            background: linear-gradient(135deg,#667eea,#a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .case-client {
            font-size: 1.15rem;
            font-weight: 700;
            color: #374151;
            margin-bottom: 8px;
        }

        .case-desc {
            font-size: 0.9rem;
            color: #6b7280;
            line-height: 1.6;
            margin-bottom: 16px;
        }

        /* stats row */
        .case-stats {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .stat-pill {
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 7px 16px;
            background: rgba(102,126,234,0.1);
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #4b5563;
            border: 1px solid rgba(102,126,234,0.15);
        }

        .stat-pill .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .dot-views { background: #a78bfa; }
        .dot-likes  { background: #f472b6; }
        .dot-subs   { background: #34d399; }

        /* ── ANIMATIONS ── */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 768px) {
            h1 { font-size: 3rem; }
            .glass-card { padding: 25px; }
            .intro-section { flex-direction: column; text-align: center; }
            .profile-photo { margin: 0 auto; }
            .video-card { width: 280px; height: 497px; }
            .cases-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div id="particles"></div>

    <svg width="0" height="0">
        <defs>
            <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%"   style="stop-color:#667eea;stop-opacity:1"/>
                <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1"/>
            </linearGradient>
        </defs>
    </svg>

    <div class="container">
        <header>
            <h1>Владислав Козмеску</h1>
            <p class="subtitle">Видеомонтажёр вертикального контента</p>
        </header>

        <!-- ── TAB NAV ── -->
        <nav class="tab-nav">
            <button class="tab-btn active" onclick="switchTab('portfolio', this)">Портфолио</button>
            <button class="tab-btn"        onclick="switchTab('contacts', this)">Контакты</button>
        </nav>

        <!-- ══════════ PAGE: PORTFOLIO ══════════ -->
        <div id="page-portfolio" class="page active">

            <div class="glass-card">
                <div class="intro-section">
                    <img src="https://i.imgur.com/fzJfgmF.jpeg" alt="Владислав Козмеску" class="profile-photo">
                    <div class="intro-text">
                        <p style="font-size:1.3rem;font-weight:600;margin-bottom:10px;">Меня зовут Владислав</p>
                        <p>Я — монтажёр рилс, которые сделают ваши видео вирусными</p>
                    </div>
                </div>
            </div>

            <div class="glass-card">
                <h2>Мои работы</h2>

                <!-- фильтр -->
                <div class="filter-bar">
                    <button class="filter-btn active" onclick="filterVideos('all', this)">Все</button>
                    <button class="filter-btn" onclick="filterVideos('podcast', this)">Подкаст</button>
                    <button class="filter-btn" onclick="filterVideos('construction', this)">Строительство</button>
                </div>

                <div class="video-grid">
                    <div class="video-card" data-category="podcast">
                        <video controls>
                            <source src="video1.mp4" type="video/mp4">
                            Ваш браузер не поддерживает видео
                        </video>
                    </div>
                    <div class="video-card" data-category="podcast">
                        <video controls>
                            <source src="video2.mp4" type="video/mp4">
                            Ваш браузер не поддерживает видео
                        </video>
                    </div>
                    <div class="video-card" data-category="podcast">
                        <video controls>
                            <source src="video3.mp4" type="video/mp4">
                            Ваш браузер не поддерживает видео
                        </video>
                    </div>
                    <div class="video-card" data-category="construction">
                        <video controls>
                            <source src="видео4.mp4" type="video/mp4">
                            Ваш браузер не поддерживает видео
                        </video>
                    </div>
                </div>
            </div>
        </div>

        <!-- ══════════ PAGE: CONTACTS ══════════ -->
        <div id="page-contacts" class="page">
            <div class="glass-card">
                <h2>Контакты</h2>
                <div class="contact-info">
                    <div class="contact-item">
                        <svg class="contact-icon" viewBox="0 0 24 24">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                            <polyline points="22,6 12,13 2,6"/>
                        </svg>
                        <div>
                            <h3 style="margin-bottom:5px;">Email</h3>
                            <p style="margin:0;">okmeledi@gmail.com</p>
                        </div>
                    </div>

                    <a href="http://t.me/Dontfall23" target="_blank" class="contact-item">
                        <svg class="telegram-icon" viewBox="0 0 24 24" fill="url(#gradient)">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69a.2.2 0 00-.05-.18c-.06-.05-.14-.03-.21-.02-.09.02-1.49.95-4.22 2.79-.4.27-.76.41-1.08.4-.36-.01-1.04-.2-1.55-.37-.63-.2-1.12-.31-1.08-.66.02-.18.27-.36.74-.55 2.92-1.27 4.86-2.11 5.83-2.51 2.78-1.16 3.35-1.36 3.73-1.36.08 0 .27.02.39.12.1.08.13.19.14.27-.01.06.01.24 0 .38z"/>
                        </svg>
                        <div>
                            <h3 style="margin-bottom:5px;">Telegram</h3>
                            <p style="margin:0;">@Dontfall23</p>
                        </div>
                    </a>
                </div>
            </div>
        </div>

    </div><!-- /container -->

    <script>
        /* ── FILTER ── */
        function filterVideos(category, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.video-card').forEach(card => {
                if (category === 'all' || card.dataset.category === category) {
                    card.classList.remove('hidden');
                } else {
                    card.classList.add('hidden');
                }
            });
        }

        /* ── TAB SWITCHING ── */
        function switchTab(name, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('page-' + name).classList.add('active');
            btn.classList.add('active');
        }

        /* ── PARTICLES ── */
        const particlesContainer = document.getElementById('particles');

        function createParticle() {
            const particle = document.createElement('div');
            particle.className = 'particle';
            const startX = Math.random() * window.innerWidth;
            const startY = Math.random() * window.innerHeight;
            const endX   = startX + (Math.random() - 0.5) * 200;
            const endY   = startY - Math.random() * 300;
            const duration = 3 + Math.random() * 4;
            const delay    = Math.random() * 2;
            particle.style.left = startX + 'px';
            particle.style.top  = startY + 'px';
            const name = 'float' + Math.random().toString(36).substr(2, 9);
            const style = document.createElement('style');
            style.innerHTML = `
                @keyframes ${name} {
                    0%,100% { transform:translate(0,0); opacity:0; }
                    10%      { opacity:.8; }
                    90%      { opacity:.8; }
                    100%     { transform:translate(${endX-startX}px,${endY-startY}px); opacity:0; }
                }`;
            document.head.appendChild(style);
            particle.style.animation = `${name} ${duration}s ease-in-out ${delay}s infinite`;
            particlesContainer.appendChild(particle);
        }

        for (let i = 0; i < 50; i++) createParticle();

        window.addEventListener('resize', () => {
            particlesContainer.innerHTML = '';
            for (let i = 0; i < 50; i++) createParticle();
        });
    </script>
</body>
</html>
